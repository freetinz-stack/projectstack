<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — FincWin</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@200;300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sage:    #5a6e3f;
      --sage-lt: #dce8d4;
      --sage-dk: #3d4d2b;
      --ink:     #111111;
      --muted:   #6b7280;
      --faint:   #f5f4f0;
      --sans: 'Hanken Grotesk', sans-serif;
      --serif: 'Instrument Serif', serif;
    }
    html, body {
      min-height: 100%; font-family: var(--sans); font-weight: 300;
      color: var(--ink); background: var(--faint);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    nav {
      background: white; border-bottom: 1px solid rgba(0,0,0,.09);
      padding: 0 48px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-size: 16px; font-weight: 500; color: var(--ink); text-decoration: none; }
    .nav-logo span { color: var(--sage); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-right a { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-right a:hover { color: var(--ink); }
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 64px 24px; text-align: center;
    }
    .code {
      font-family: var(--serif); font-size: 96px; line-height: 1;
      color: var(--sage); margin-bottom: 24px;
    }
    h1 { font-size: 28px; font-weight: 500; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--muted); max-width: 380px; margin: 0 auto 32px; }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 12px 28px; background: var(--ink); color: white;
      border-radius: 50px; font-size: 14px; font-weight: 500;
      text-decoration: none; transition: background .2s;
    }
    .btn-primary:hover { background: var(--sage); }
    .btn-outline {
      padding: 12px 28px; border: 1px solid rgba(0,0,0,.15); color: var(--ink);
      border-radius: 50px; font-size: 14px; font-weight: 400;
      text-decoration: none; transition: border-color .2s;
    }
    .btn-outline:hover { border-color: var(--sage); color: var(--sage); }
    footer {
      padding: 24px 48px; text-align: center;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid rgba(0,0,0,.07);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Finc<span>Win</span></a>
    <div class="nav-right">
      <a href="/pricing">Pricing</a>
      <a href="/signin">Sign in</a>
    </div>
  </nav>

  <main>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
    <div class="btn-row">
      <a href="/app" class="btn-primary">Open FincWin →</a>
      <a href="/" class="btn-outline">Go home</a>
    </div>
  </main>

  <footer>
    &copy; <script>document.write(new Date().getFullYear())</script> FincWin &nbsp;·&nbsp;
    <a href="/privacy" style="color:inherit;">Privacy</a> &nbsp;·&nbsp;
    <a href="/terms" style="color:inherit;">Terms</a>
  </footer>
</body>
</html>
